<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local AI — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-noise {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .wrap {
      width: 100%; max-width: 380px;
      padding: 20px;
      position: relative; z-index: 1;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #d97706, #92400e);
      border-radius: 12px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 22px;
      margin-bottom: 14px;
      box-shadow: 0 0 40px rgba(217,119,6,0.2);
    }

    .logo-text {
      font-size: 22px; font-weight: 600;
      letter-spacing: -0.5px;
      color: #f0f0f0;
    }

    .logo-sub {
      font-size: 13px; color: #555; margin-top: 4px;
    }

    .card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 32px;
    }

    h2 {
      font-size: 18px; font-weight: 600;
      margin-bottom: 6px; letter-spacing: -0.3px;
    }

    .card-sub {
      font-size: 13px; color: #555;
      margin-bottom: 28px; line-height: 1.6;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px; color: #666;
      margin-bottom: 7px; font-weight: 500;
    }

    input {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 9px;
      padding: 11px 14px;
      color: #e8e8e8;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #d97706; }

    .btn {
      width: 100%;
      padding: 12px;
      background: #d97706;
      color: #000;
      border: none; border-radius: 9px;
      font-size: 14px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 4px;
      letter-spacing: -0.1px;
    }

    .btn:hover { background: #f59e0b; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #333;
    }

    .footer a { color: #d97706; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="bg-noise"></div>

<div class="wrap">
  <div class="logo-area">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Local AI</div>
    <div class="logo-sub">Private · Self-hosted · Yours</div>
  </div>

  <div class="card">
    <h2>Welcome back</h2>
    <p class="card-sub">Sign in to access the AI assistant.</p>

    <div class="error" id="err"></div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="your username" autocomplete="username" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') login()" />
    </div>

    <button class="btn" onclick="login()" id="btn">Sign in</button>
  </div>

  <div class="footer">
    <a href="about.html">About this project</a> · Built by Deval
  </div>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = 'index.html';

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');

    if (!username || !password) {
      showErr('Please enter your username and password.');
      return;
    }

    btn.disabled = true; btn.textContent = 'Signing in…';
    err.style.display = 'none';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        localStorage.setItem('isAdmin', data.isAdmin);
        window.location.href = 'index.html';
      } else {
        showErr(data.error || 'Sign in failed.');
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    } catch {
      showErr('Could not reach server.');
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('err');
    el.textContent = msg; el.style.display = 'block';
  }
</script>
</body>
</html>
